services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    environment:
      MONGODB_URI: mongodb://mongo:27017
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - '5001:5001'
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:5001
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  mongo-data:
